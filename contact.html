<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お問い合わせ - 留学ダイレクト</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="article.css">
  <style>
    .contact-form { max-width: 600px; }
    .form-group { margin-bottom: 24px; }
    .form-label { display: block; font-weight: 700; font-size: 0.9rem; margin-bottom: 8px; }
    .form-input, .form-textarea, .form-select {
      width: 100%; padding: 14px 18px;
      border: 2px solid #E8E5E0; border-radius: 10px;
      font-size: 1rem; font-family: inherit;
      background: #FAFAF8; transition: border-color 0.2s;
      outline: none;
    }
    .form-input:focus, .form-textarea:focus { border-color: #FF4828; }
    .form-textarea { min-height: 160px; resize: vertical; }
    .form-submit {
      background: #FF4828; color: #fff;
      padding: 15px 40px; border: none; border-radius: 8px;
      font-size: 1rem; font-weight: 700; cursor: pointer;
      transition: background 0.2s; font-family: inherit;
    }
    .form-submit:hover { background: #e03820; }
  </style>
</head>
<body>
<header class="header">
  <div class="container">
    <div class="header-inner">
      <a href="/" class="logo"><span class="logo-mark"><img src="/logo.svg" alt="" width="34" height="34" class="logo-img"></span><span class="logo-text"><span class="logo-jp">留学</span><span class="logo-en">ダイレクト</span></span></a>
      <nav class="nav" id="mainNav">
        <a href="/">ホーム</a>
        <a href="/#quiz">留学先診断</a>
        <a href="/#simulator">費用計算</a>
        <a href="/#countries">国別ガイド</a>
        <a href="articles/direct-apply.html">直接申込</a>
        <a href="articles/preparation.html">準備リスト</a>
        <a href="articles/scholarship.html">奨学金</a>
      </nav>
      <button class="nav-toggle" id="navToggle" onclick="toggleNav()" aria-label="メニュー">
        <span></span><span></span><span></span>
      </button>
    </div>
  </div>
</header>

<div class="article-hero">
  <div class="container">
    <span class="article-label">Contact</span>
    <h1 class="article-title">お問い合わせ</h1>
    <div class="article-meta"><span>記事の誤り・ご質問・ご提案などはこちらへ</span></div>
  </div>
</div>

<div class="article-body">
  <a href="/" class="back-link">← ホームに戻る</a>

  <div class="info-box">
    <h4>📌 お問い合わせ前にご確認ください</h4>
    <ul>
      <li>留学費用・手続きの詳細は各語学学校・大使館にお問い合わせください</li>
      <li>記事の内容に誤りを見つけた場合は「記事の誤り」を選択してください</li>
      <li>返信には数日いただく場合があります</li>
    </ul>
  </div>

  <div class="contact-form">
    <form name="contact" method="POST" data-netlify="true" netlify-honeypot="bot-field">
      <input type="hidden" name="form-name" value="contact">
      <p style="display:none;"><label>スパム対策: <input name="bot-field"></label></p>
      <div class="form-group">
        <label class="form-label" for="name">お名前</label>
        <input type="text" id="name" name="name" class="form-input" placeholder="山田 太郎" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="email">メールアドレス</label>
        <input type="email" id="email" name="email" class="form-input" placeholder="example@email.com" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="category">お問い合わせ種別</label>
        <select id="category" name="category" class="form-select">
          <option value="">選択してください</option>
          <option value="content">記事の内容について</option>
          <option value="error">記事の誤りの指摘</option>
          <option value="collaboration">取材・コラボのご依頼</option>
          <option value="other">その他</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label" for="message">メッセージ</label>
        <textarea id="message" name="message" class="form-textarea" placeholder="お問い合わせ内容をご記入ください" required></textarea>
      </div>
      <button type="submit" class="form-submit">送信する →</button>
    </form>
  </div>
</div>

<footer class="footer">
  <div class="container">
    <div class="footer-bottom">
      <p>© 2025 留学ダイレクト. All rights reserved.</p>
    </div>
  </div>
</footer>
<script>
function toggleNav(){var n=document.getElementById('mainNav');n.classList.toggle('mobile-open');}
document.addEventListener('click',function(e){var n=document.getElementById('mainNav');var b=document.getElementById('navToggle');if(n&&b&&!n.contains(e.target)&&!b.contains(e.target)){n.classList.remove('mobile-open');}});
</script>
</body>
</html>
