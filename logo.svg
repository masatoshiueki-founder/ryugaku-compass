<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40">
  <defs>
    <radialGradient id="globe" cx="36%" cy="28%" r="72%">
      <stop offset="0%" stop-color="#6DD5FA"/>
      <stop offset="45%" stop-color="#1A6FE0"/>
      <stop offset="100%" stop-color="#071A4A"/>
    </radialGradient>
    <clipPath id="clip"><circle cx="20" cy="20" r="18"/></clipPath>
  </defs>
  <!-- 球体 -->
  <circle cx="20" cy="20" r="18" fill="url(#globe)"/>
  <!-- 緯線・経線 -->
  <g clip-path="url(#clip)" fill="none" stroke="rgba(255,255,255,0.22)" stroke-width="0.75">
    <line x1="2" y1="20" x2="38" y2="20"/>
    <line x1="2" y1="13.5" x2="38" y2="13.5"/>
    <line x1="2" y1="26.5" x2="38" y2="26.5"/>
    <ellipse cx="20" cy="20" rx="9" ry="18"/>
    <ellipse cx="20" cy="20" rx="18" ry="6.5"/>
  </g>
  <!-- 輪郭 -->
  <circle cx="20" cy="20" r="18" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="0.6"/>
  <!-- 飛行軌跡 -->
  <path d="M7 30 Q15 5 33 12"
        stroke="#FFD740" stroke-width="2.2" fill="none"
        stroke-dasharray="3,2.2" stroke-linecap="round"
        clip-path="url(#clip)"/>
  <!-- 出発地 -->
  <circle cx="7" cy="30" r="1.8" fill="rgba(255,215,64,0.65)"/>
  <!-- 目的地 -->
  <circle cx="33" cy="12" r="2.6" fill="#FFD740"/>
  <circle cx="33" cy="12" r="1.3" fill="#fff"/>
</svg>
